version: '3.9'

services:

  # ── Property Service (ASP.NET Core 9) ──────────────────────────────────────
  property-service:
    build:
      context: ./src/PropertyService
      dockerfile: Dockerfile
    container_name: pip-property-service
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:8080
      - ConnectionStrings__DefaultConnection=Data Source=/data/property.db
    volumes:
      - service-data:/data
    ports:
      - "5001:8080"
    networks:
      - pip-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # ── Inspection Service (ASP.NET Core 9 Minimal API) ─────────────────────────
  inspection-service:
    build:
      context: ./src/InspectionService
      dockerfile: Dockerfile
    container_name: pip-inspection-service
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:8080
      - ConnectionStrings__DefaultConnection=Data Source=/data/inspection.db
    volumes:
      - service-data:/data
    ports:
      - "5002:8080"
    networks:
      - pip-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # ── Document Service (ASP.NET Core) ──────────────────────────────────────
  document-service:
    build:
      context: ./src/DocumentService
      dockerfile: Dockerfile
    container_name: pip-document-service
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:8080
      - ConnectionStrings__DefaultConnection=Data Source=/data/document.db
    volumes:
      - service-data:/data
    ports:
      - "5003:8080"
    networks:
      - pip-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # ── Risk Scoring Service (Python FastAPI) ───────────────────────────────────
  risk-scoring-service:
    build:
      context: ./src/RiskScoringService
      dockerfile: Dockerfile
    container_name: pip-risk-scoring
    environment:
      - PYTHONUNBUFFERED=1
      - INSPECTION_SERVICE_URL=http://inspection-service:8080
      - PROPERTY_SERVICE_URL=http://property-service:8080
    ports:
      - "5004:8000"
    networks:
      - pip-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # ── Notification Service (Python FastAPI) ────────────────────────────────────
  notification-service:
    build:
      context: ./src/NotificationService
      dockerfile: Dockerfile
    container_name: pip-notification-service
    environment:
      - PYTHONUNBUFFERED=1
    ports:
      - "5005:8000"
    networks:
      - pip-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # ── Demo Dashboard (nginx static) ───────────────────────────────────────────
  demo-dashboard:
    image: nginx:alpine
    container_name: pip-dashboard
    volumes:
      - ./demo/dashboard:/usr/share/nginx/html:ro
      - ./demo/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "8080:80"
    networks:
      - pip-network

networks:
  pip-network:
    driver: bridge

volumes:
  service-data:
