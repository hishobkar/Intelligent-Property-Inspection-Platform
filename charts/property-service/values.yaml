replicaCount: 2

image:
  repository: ${ACR_NAME}.azurecr.io/property-service
  tag: latest
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 80
  targetPort: 8080

ingress:
  enabled: true
  className: nginx
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /$1
  hosts:
    - host: api.pip.example.com
      paths:
        - path: /api/properties(.*)
          pathType: Prefix

resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 250m
    memory: 256Mi

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 10
  targetCPUUtilizationPercentage: 80
  targetMemoryUtilizationPercentage: 80

livenessProbe:
  httpGet:
    path: /health
    port: 8080
  initialDelaySeconds: 30
  periodSeconds: 10

readinessProbe:
  httpGet:
    path: /health
    port: 8080
  initialDelaySeconds: 5
  periodSeconds: 5

env:
  - name: ASPNETCORE_ENVIRONMENT
    value: "Production"
  - name: ApplicationInsights__ConnectionString
    valueFrom:
      secretKeyRef:
        name: app-insights
        key: connectionString
  - name: ConnectionStrings__DefaultConnection
    valueFrom:
      secretKeyRef:
        name: sql-database
        key: connectionString
  - name: ConnectionStrings__ServiceBus
    valueFrom:
      secretKeyRef:
        name: service-bus
        key: connectionString

configMap:
  data:
    OTEL_EXPORTER_OTLP_ENDPOINT: "http://otel-collector:4317"
    OTEL_SERVICE_NAME: "PropertyService"

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1001
  fsGroup: 2000

securityContext:
  capabilities:
    drop:
      - ALL
  readOnlyRootFilesystem: true
  runAsNonRoot: true
  runAsUser: 1001